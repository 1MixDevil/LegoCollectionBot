services:
  db:
    container_name: postgres
    image: postgres:13.0-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: aml1
      POSTGRES_PASSWORD: aml1
      POSTGRES_DB: lego_db
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aml1 -d lego_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth-service:
    container_name: auth
    build: ./services/auth
    volumes:
      - ./services/auth:/app
    ports:
      - "${AUTHORIZATION_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://aml1:aml1@db:5432/lego_db
      POSTGRES_HOST: db
      POSTGRES_USER: aml1
      POSTGRES_PASSWORD: aml1
      POSTGRES_DB: lego_db
      AUTHORIZATION_PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  collection-service:
    container_name: collection
    build: ./services/collection
    volumes:
      - ./services/collection:/app
    ports:
      - "${COLLECTION_PORT:-8001}:8001"
    environment:
      DATABASE_URL: postgresql+psycopg2://aml1:aml1@db:5432/lego_db
      POSTGRES_HOST: db
      POSTGRES_USER: aml1
      POSTGRES_PASSWORD: aml1
      POSTGRES_DB: lego_db
      COLLECTION_PORT: "8001"
      CATALOG_DATA_SOURCE: ${CATALOG_DATA_SOURCE:-rebrickable}
      REBRICKABLE_REQUEST_INTERVAL: ${REBRICKABLE_REQUEST_INTERVAL:-1.05}
      DISPLAY_CURRENCY: ${DISPLAY_CURRENCY:-RUB}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  bot-service:
    container_name: telegram-bot
    build: ./services/bot
    volumes:
      - ./services/bot:/app
    environment:
      AUTHORIZATION_IP: auth-service
      AUTHORIZATION_PORT: "8000"
      COLLECTION_IP: collection-service
      COLLECTION_PORT: "8001"
      COLLAGE_MAX_CONCURRENT: ${COLLAGE_MAX_CONCURRENT:-1}
      COLLAGE_FORCE_BATCH_ABOVE: ${COLLAGE_FORCE_BATCH_ABOVE:-40}
      COLLAGE_BATCH_SIZE: ${COLLAGE_BATCH_SIZE:-40}
      COLL_MIN_HEIGHT: ${COLL_MIN_HEIGHT:-750}
      CONCURRENT_BATCHES: ${CONCURRENT_BATCHES:-3}
    depends_on:
      - auth-service
      - collection-service
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: ${BOT_MEM_LIMIT:-768m}
    memswap_limit: ${BOT_MEMSWAP_LIMIT:-768m}

volumes:
  postgres_data:
